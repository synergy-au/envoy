name: Linting and Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.11", "3.12", "3.13"]
        
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: uv sync --extra dev --extra test
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Typing (ty)
        run: uv run ty check .
      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src/

  docker_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v1

      - name: Build and push Docker image
        run: |
          echo $'{ "experimental": true, "features": { "buildkit" : true } }' | sudo tee /etc/docker/daemon.json
          echo '${{ secrets.BSGIP_PAT }}' > ./github.pat
          echo '${{ secrets.GITLAB_PAT }}' > ./gitlab.pat
          sudo service docker restart
          docker version -f '{{.Server.Experimental}}'
          docker build -t envoy:test -f Dockerfile.server --secret id=github_pat,src=github.pat . --no-cache

  pytest:
    strategy:
      matrix:
        pyver: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: |
          sudo apt install -y postgresql
          uv sync --extra test

      - name: Run Pytest
        run: |
          uv run pytest -n auto --junit-xml=.test_report_py${{ matrix.pyver }}.xml
        
      - name: Upload Results
        uses: test-summary/action@v2.6
        with:
          paths: .test_report_py${{ matrix.pyver }}.xml
        if: always()
  
  alembic:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://envoyuser:envoypass@postgres:5432/envoydb

    container: python:3.13-slim

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: envoypass
          POSTGRES_USER: envoyuser
          POSTGRES_DB: envoydb

        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: |
          uv sync

      - name: Upgrade
        run: |
          cd src/envoy/server/
          uv run alembic upgrade head

      - name: Downgrade
        run: |
          cd src/envoy/server/
          uv run alembic downgrade base
